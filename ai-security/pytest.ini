[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Tampilkan output log WARNING ke atas saat test gagal
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s %(levelname)s %(name)s: %(message)s

# Hentikan setelah 3 kegagalan pertama untuk mempercepat feedback
# Hapus baris ini jika ingin menjalankan semua test
# addopts = --maxfail=3

# Nonaktifkan warning yang tidak relevan dari library eksternal
filterwarnings =
    ignore::DeprecationWarning:sklearn.*
    ignore::DeprecationWarning:numpy.*
